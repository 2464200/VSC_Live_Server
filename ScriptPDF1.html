<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione PDF - ScriptPDF1</title>
<style>
* { box-sizing: border-box; }
body { font-family: Arial, sans-serif;background: #111; color: #fff; margin: 0; padding: 20px; text-align: center; }
nav { background: #222; padding: 10px; margin-bottom: 30px; border-radius: 5px; }
nav a { color: #ff7f00; margin: 0 15px; text-decoration: none; font-weight: bold; }
nav a:hover { text-decoration: underline; }
.container { max-width: 900px; margin: 0 auto; background: #222; padding: 30px; border-radius: 10px; }
h1 { color: #ff7f00; margin-top: 0; }
.status { background: #333; padding: 12px; margin-bottom: 20px; border-radius: 5px; font-size: 13px; }
.status.loading { color: #ffaa00; }
.status.ready { color: #00ff00; }
.status.error { color: #ff5555; }
.control-group { margin: 30px 0; text-align: left; }
label { color: #ff7f00; font-weight: bold; display: block; margin-bottom: 8px; }
select { background: #333; color: #fff; padding: 10px; border: 1px solid #444; border-radius: 5px; font-size: 14px; width: 100%; margin-bottom: 15px; }
select:focus { outline: none; border-color: #ff7f00; }
.button-group { display: flex; gap: 15px; justify-content: center; margin: 30px 0; flex-wrap: wrap; }
button { background: #ff7f00; color: #000; padding: 12px 30px; border: none; border-radius: 5px; font-weight: bold; font-size: 14px; cursor: pointer; transition: all 0.3s; min-width: 120px; }
button:hover { background: #ffaa33; }
button:active { background: #dd6600; }
.pdf-info { background: #333; padding: 20px; border-radius: 5px; margin: 20px 0; color: #fff; display: none; }
.pdf-info.show { display: block; }
.pdf-name { color: #ff7f00; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
.pdf-counter { color: #aaa; font-size: 12px; }
.message { min-height: 20px; margin: 20px 0; padding: 12px; border-radius: 5px; font-weight: bold; }
.message.error { background: #dc3545; color: #fff; }
.message.success { background: #28a745; color: #fff; }
.message.info { background: #17a2b8; color: #fff; }
</style>
<!-- Config del server API -->
<script>
const pdfOrigin = window.location.origin || (window.location.protocol + '//' + window.location.host);
window.PDF_SERVER_HOST = pdfOrigin;
window.PDF_SERVER_TIMEOUT = 8000;  // 8 secondi timeout
window.PDF_SERVER_RETRIES = 2;     // 2 retry
</script>
</head>
<body>

<div id="global-nav-container"></div>
<script src="/nav.js"></script>

<div class="container">
<h1> Gestione PDF - ScriptPDF1</h1>

<div class="status loading" id="status">
<strong> Caricamento...</strong> <span id="status-text">Connessione al server...</span>
</div>

<div class="control-group">
<label for="pdf-select"> Seleziona PDF:</label>
<select id="pdf-select" onchange="onPdfSelected()">
<option value="">-- Caricamento in corso... --</option>
</select>
</div>

<div class="pdf-info" id="pdf-info">
<div class="pdf-name" id="pdf-name"></div>
<div class="pdf-counter" id="pdf-counter"></div>
</div>

<div class="button-group">
    <button onclick="previousPdf()" title="PDF precedente"> Precedente</button>
    <button onclick="nextPdf()" title="PDF successivo">Successivo </button>
    <select id="viewer-select" title="Seleziona Viewer per apertura" style="background:#333;color:#fff;padding:8px;border-radius:5px;border:1px solid #444;min-width:180px;">
        <option value="auto">Apri (auto)</option>
        <option value="adobe">Apri con Adobe Reader (se installato)</option>        <option value="chrome">Apri con Chrome</option>    </select>
    <input id="adobe-path" placeholder="Percorso Adobe (opzionale) es: C:\\Program Files\\Adobe\\Acrobat DC\\Acrobat\\Acrobat.exe" style="background:#222;color:#fff;border:1px solid #444;padding:8px;border-radius:5px;min-width:420px;" />
    <button id="save-adobe" onclick="saveAdobePath()" title="Salva percorso Adobe" style="min-width:auto;padding:8px 12px;">Salva</button>
    <button id="open-btn" onclick="openCurrentPdf()" title="Apri PDF sul monitor secondario"> Apri</button>
    <button onclick="closePdfViewer()" title="Chiudi il PDF (o premi ESC sul monitor secondario)"> Chiudi PDF</button>
</div>

<div id="open-status" style="margin-top:12px; color:#aaa; font-size:13px;"></div>

<div class="message" id="message"></div>

<div style="margin-top:18px; text-align:left; background:#111; padding:12px; border-radius:6px; display:none;" id="log-box">
    <div style="font-weight:bold; color:#ff7f00; margin-bottom:8px;">Ultimi log (apertura PDF)</div>
    <pre id="log-pre" style="max-height:220px; overflow:auto; color:#ddd; background:#000; padding:8px; border-radius:4px;">-- nessun log --</pre>
</div>

</div>

<script>
// VARIABILI GLOBALI
let pdfList = [];
let currentIndex = 0;
let serverReady = false;
let serverAutoStarted = false;

/**
 * INIZIALIZZAZIONE - Eseguita al caricamento della pagina
 */
window.addEventListener("beforeunload", async function() {
    // Prima di chiudere la pagina, log scarico
    console.log("🔌 Chiusura pagina...");
});

// Funzione robusta para contattare il server PDF con retry
async function checkPdfServer() {
    console.log("🟡 checkPdfServer(): verifica connessione con retry...");
    const maxRetries = window.PDF_SERVER_RETRIES || 2;
    const timeout = window.PDF_SERVER_TIMEOUT || 8000;
    
    for (let attempt = 1; attempt <= maxRetries; attempt++) {
        try {
            console.log(`   Tentativo ${attempt}/${maxRetries}...`);
            const controller = new AbortController();
            const timeoutId = setTimeout(() => {
                console.log(`   ⏱️ Timeout ${timeout}ms attivato!`);
                controller.abort();
            }, timeout);
            
            const url = window.PDF_SERVER_HOST + '/api/health';
            console.log(`   URL: ${url}`);
            
            const response = await fetch(url, {
                method: 'GET',
                signal: controller.signal,
                cache: 'no-store'
            });
            
            clearTimeout(timeoutId);
            console.log(`   Response ricevuta: Status ${response.status}, OK: ${response.ok}`);
            
            if (response.ok) {
                const data = await response.json();
                console.log("   ✅ PDF Server raggiungibile:", data);
                return true;
            } else {
                console.warn(`   ⚠️ Response non OK: ${response.status}`);
            }
        } catch (error) {
            const isAbort = error.name === 'AbortError';
            const errorMsg = isAbort ? 'Timeout' : error.message;
            console.warn(`   ❌ Tentativo ${attempt} fallito: ${errorMsg}`);
            
            if (attempt < maxRetries) {
                const delayMs = 500 * attempt;  // Backoff: 500ms, 1000ms
                console.log(`   ⏳ Attesa ${delayMs}ms prima del prossimo tentativo...`);
                await new Promise(resolve => setTimeout(resolve, delayMs));
            }
        }
    }
    
    console.warn("❌ checkPdfServer: tutti i tentativi falliti");
    return false;
}

document.addEventListener("DOMContentLoaded", async function() {
    console.log("🚀 Inizializzazione pagina...");
    console.log("📍 PDF Server: " + window.PDF_SERVER_HOST);
    
    updateStatus("Verifica connessione server...", "loading");
    
    try {
        // Verifica connessione al PDF Server
        const serverOk = await checkPdfServer();
        
        if (serverOk) {
            console.log("✅ Server PDF disponibile");
            serverReady = true;
            updateStatus("Server pronto", "ready");
            loadPdfData();
        } else {
            console.error("❌ Server PDF non raggiungibile");
            updateStatus("❌ Server non raggiungibile", "error");
            showMessage("❌ PDF Server non disponibile\n\n💡 Avvia il server unificato con startup.ps1 o node unified-server.js", "error");
        }
        
    } catch (error) {
        console.error("❌ Errore durante inizializzazione:", error);
        updateStatus("Errore", "error");
        showMessage(`❌ Errore fatale: ${error.message}`, "error");
    }
    // Carica percorso Adobe salvato in localStorage
    const adobeInput = document.getElementById('adobe-path');
    if (adobeInput) {
        const saved = localStorage.getItem('adobePath') || '';
        adobeInput.value = saved;
    }
});

/**
 * CARICAMENTO DATI PDF LIST
 */
async function loadPdfData() {
    console.log("🟣 loadPdfData(): inizio caricamento...");
    try {
        console.log("   📚 Caricamento lista PDF...");
        updateStatus("Caricamento lista PDF...", "loading");
        
        // Fetch diretto dal server PDF
        const url = window.PDF_SERVER_HOST + '/api/pdf-list?t=' + Date.now();
        console.log("   URL:", url);
        console.log("   Invio fetch...");
        
        const response = await fetch(url, {
            method: 'GET'
        });
        
        console.log("   Response ricevuta - Status:", response.status, "OK:", response.ok);
        
        if (!response.ok) {
            const errText = await response.text();
            console.error("❌ Response NOT OK! Body:", errText);
            throw new Error(`HTTP ${response.status}: ${errText}`);
        }
        
        console.log("   Parsing JSON...");
        const data = await response.json();
        console.log("   ✅ JSON parsato:", {
            success: data.success,
            files: data.files ? data.files.length : 0,
            folder: data.folder
        });
        
        if (!data.success || !Array.isArray(data.files)) {
            console.error("❌ Dati invalidi:", {success: data.success, files: Array.isArray(data.files), error: data.error});
            throw new Error(data.error || "Dati invalidi dalla API");
        }
        
        pdfList = data.files;
        console.log(`✅ ${pdfList.length} PDF caricati`);
        
        if (pdfList.length === 0) {
            console.warn("⚠️  Nessun PDF trovato!");
            updateStatus("Nessun PDF trovato in C:\\VSC_SCRIPT_PDF", "error");
            showMessage("📁 La cartella C:\\VSC_SCRIPT_PDF è vuota", "error");
            return;
        }
        
        // Popola UI
        console.log("   Popolo UI con", pdfList.length, "PDF");
        populateSelect();
        updateDisplay();
        updateStatus(`Pronto - ${pdfList.length} PDF disponibili`, "ready");
        console.log("✅ loadPdfData COMPLETATO");
        
    } catch (error) {
        const msg = error.message || "Errore sconosciuto";
        console.error("❌ loadPdfData ERRORE:", error);
        console.error("   Message:", msg);
        
        updateStatus(`Errore: ${msg}`, "error");
        showMessage(`❌ ${msg}\n\n💡 Se il server non è avviato, esegui:\nnode pdf-server-simple.js`, "error");
    }
}

/**
 * AGGIORNA STATO UI
 */
function updateStatus(text, type) {
    const status = document.getElementById("status");
    const statusText = document.getElementById("status-text");
    if (status && statusText) {
        status.className = `status ${type}`;
        statusText.textContent = text;
    }
}

/**
 * POPOLA SELECT CON LISTA PDF
 */
function populateSelect() {
    const select = document.getElementById("pdf-select");
    if (!select) return;
    
    select.innerHTML = "";
    pdfList.forEach((pdf, idx) => {
        const opt = document.createElement("option");
        opt.value = idx;
        opt.textContent = `${idx + 1}. ${pdf.name || "PDF senza nome"}`;
        select.appendChild(opt);
    });
    
    if (pdfList.length > 0) select.value = 0;
}

/**
 * AGGIORNA DISPLAY PDF CORRENTE
 */
function updateDisplay() {
    const info = document.getElementById("pdf-info");
    
    if (!pdfList.length || currentIndex < 0 || currentIndex >= pdfList.length) {
        if (info) info.classList.remove("show");
        return;
    }
    
    const pdf = pdfList[currentIndex];
    const nameEl = document.getElementById("pdf-name");
    const counterEl = document.getElementById("pdf-counter");
    const select = document.getElementById("pdf-select");
    
    if (nameEl) nameEl.textContent = pdf.name || "PDF senza nome";
    if (counterEl) counterEl.textContent = `${currentIndex + 1} di ${pdfList.length}`;
    if (info) info.classList.add("show");
    if (select) select.value = currentIndex;
}

/**
 * NAVIGAZIONE - PDF PRECEDENTE
 */
function previousPdf() {
    if (pdfList.length < 2) return;
    currentIndex = (currentIndex - 1 + pdfList.length) % pdfList.length;
    updateDisplay();
}

/**
 * NAVIGAZIONE - PDF SUCCESSIVO
 */
function nextPdf() {
    if (pdfList.length < 2) return;
    currentIndex = (currentIndex + 1) % pdfList.length;
    updateDisplay();
}

/**
 * CAMBIO SELEZIONE DA SELECT
 */
function onPdfSelected() {
    const select = document.getElementById("pdf-select");
    if (select) currentIndex = parseInt(select.value) || 0;
    updateDisplay();
}

/**
 * APERTURA PDF IN CHROME
 */
async function openCurrentPdf() {
    console.log("🔴 openCurrentPdf INIZIO");
    console.log("   serverReady:", serverReady);
    console.log("   pdfList.length:", pdfList.length);
    console.log("   currentIndex:", currentIndex);
    
    if (!serverReady) {
        console.error("❌ Server NON ready!");
        showMessage("⚠️ Server non disponibile", "error");
        return;
    }
    
    if (!pdfList.length || currentIndex < 0 || currentIndex >= pdfList.length) {
        console.error("❌ PDF list vuoto o indice invalido!");
        showMessage("❌ PDF non disponibile", "error");
        return;
    }
    
    const pdf = pdfList[currentIndex];
    console.log("   PDF selezionato:", pdf.name);
    console.log("   Percorso:", pdf.path);
    
    if (!pdf || !pdf.path || !pdf.name) {
        console.error("❌ PDF dati invalidi!");
        showMessage("❌ PDF corrotto o invalido", "error");
        return;
    }
    
    try {
        console.log(`📖 Apertura PDF: ${pdf.name}`);
        updateStatus(`Apertura ${pdf.name}...`, "loading");
        
        const url = window.PDF_SERVER_HOST + '/api/open-pdf';
        console.log("   URL server:", url);
        
        const viewerSelect = document.getElementById('viewer-select');
        const viewer = viewerSelect ? viewerSelect.value : 'auto';
        const adobeInput = document.getElementById('adobe-path');
        const adobePath = adobeInput ? adobeInput.value.trim() : '';

        const payload = { 
            filePath: pdf.path, 
            fileName: pdf.name,
            viewer: viewer,
            adobePath: adobePath
        };
        console.log("   Payload:", JSON.stringify(payload));
        
        console.log("   Invio fetch...");
        // UI: disable open button and show status
        const openBtn = document.getElementById('open-btn');
        if (openBtn) openBtn.disabled = true;
        const openStatus = document.getElementById('open-status');
        if (openStatus) openStatus.textContent = 'Apertura in corso...';

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        console.log("   Response ricevuta:", response.status, response.ok);
        
        if (!response.ok) {
            const errText = await response.text();
            console.error("❌ Response NOT OK! Status:", response.status, "Body:", errText);
            throw new Error(`HTTP ${response.status}: ${errText}`);
        }
        
        const data = await response.json();
        console.log("   JSON data:", JSON.stringify(data));
        
        if (data.success) {
            console.log(`✅ PDF aperto con successo: ${pdf.name}`);
            showMessage(`✅ ${pdf.name}`, "success");
            updateStatus(`Aperto: ${pdf.name}`, "ready");
            if (openStatus) openStatus.textContent = 'Aperto';

            // Mostra ultimi log di apertura per debug/feedback
            try {
                const logUrl = window.PDF_SERVER_HOST + '/api/pdf-log-tail?t=' + Date.now();
                const lresp = await fetch(logUrl);
                if (lresp.ok) {
                    const lj = await lresp.json();
                    if (lj.success && Array.isArray(lj.lines)) {
                        const box = document.getElementById('log-box');
                        const pre = document.getElementById('log-pre');
                        if (pre && box) {
                            pre.textContent = lj.lines.join('\n');
                            box.style.display = 'block';
                        }
                    }
                }
            } catch (e) {
                console.warn('Impossibile caricare log:', e.message);
            }

            if (openBtn) openBtn.disabled = false;
        } else {
            console.error("❌ API ritorna success=false:", data.error);
            throw new Error(data.error || "Errore sconosciuto");
        }
    } catch (error) {
        const msg = error.message || "Errore apertura PDF";
        console.error("❌ CATCH ERRORE:", error);
        console.error("   Message:", msg);
        
        updateStatus(`Errore: ${msg}`, "error");
        showMessage(`❌ ${msg}`, "error");
    }
}

/**
 * CHIUSURA PDF E CHROME
 */
async function closePdfViewer() {
    console.log("🛑 Chiusura PDF viewer...");
    
    try {
        if (!serverReady) {
            console.warn("Server non disponibile, skip chiusura remota");
        } else {
            const url = window.PDF_SERVER_HOST + '/api/close-chrome';
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
        }
    } catch (error) {
        console.warn("⚠️ Errore chiusura remota:", error.message);
    }
    
    showMessage("Chiusura in corso...", "info");
    setTimeout(() => window.close(), 1000);
}

/**
 * MOSTRA MESSAGGIO TEMPORANEO
 */
function showMessage(text, type) {
    const msg = document.getElementById("message");
    if (!msg) return;
    
    msg.className = `message ${type}`;
    msg.textContent = text;
    
    if (type === "success" || type === "error") {
        setTimeout(() => {
            msg.textContent = "";
            msg.className = "message";
        }, 5000);
    }
}

function saveAdobePath() {
    const adobeInput = document.getElementById('adobe-path');
    if (!adobeInput) return;
    const p = adobeInput.value.trim();
    localStorage.setItem('adobePath', p);
    showMessage('Percorso Adobe salvato', 'success');
}

// LOG INIZIALE
console.log("📍 ScriptPDF1 - Gestione automatica server");
console.log("   💡 Il server PDF si avvia/spegne AUTOMATICAMENTE");
console.log("   💡 Assicurati che server-manager.js sia avviato: node server-manager.js");

</script>

</body>
</html>
