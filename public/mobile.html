<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Coreografie Monster Country Group</title>
<link rel="stylesheet" href="mobile-style.css">
</head>
<body>
<div id="global-nav-container"></div>
<script src="/nav.js"></script>
  <!-- Header fisso -->
  <div class="header">
    <div class="logo">
      <h1>🤠 Monster Country Group</h1>
      <p class="subtitle">Coreografie Richieste</p>
    </div>
    <div class="info-bar">
      <span class="date" id="dateTime">📅 Caricamento...</span>
      <span id="nextCoreoLabel">Prossima Coreo:</span>
      <span id="nextCoreoValue" role="status" aria-live="polite" aria-atomic="true">Caricamento...</span>

      <button class="btn-menu" onclick="toggleMenu()">⚙️</button>
    </div>
  </div>

  <!-- Menu controlli (nascosto di default) -->
  <div class="menu-panel" id="menuPanel">
    <div class="menu-content">
      <h3>⚙️ Controlli</h3>
      
      <div class="control-group">
        <label>🚀 Velocità Scroll</label>
        <input type="range" id="speed" min="1" max="30" value="20">
        <span id="speedValue">20</span>
      </div>

      <div class="control-group">
        <label>⏱️ Pausa (secondi)</label>
        <input type="range" id="pause" min="0" max="10" value="2">
        <span id="pauseValue">2</span>
      </div>

      <div class="control-buttons">
        <button class="btn-control btn-stop" id="stopScroll">⏸️ Pausa</button>
        <button class="btn-control btn-play" id="resumeScroll">▶️ Riprendi</button>
      </div>

      <div class="control-buttons">
        <button class="btn-control btn-fullscreen" onclick="toggleFullscreen()">📱 Schermo Intero</button>
      </div>

      <button class="btn-close" onclick="toggleMenu()">✖️ Chiudi</button>
    </div>
  </div>

  <!-- Legenda -->
  <div class="legend">
    <span class="legend-item">
      <span class="badge badge-done">✓</span> = Già eseguita
    </span>
  </div>

  <!-- Contenitore scroll -->
  <div class="scroll-container" id="scrollContainer">
    <div id="data-body">
      <!-- Le coreografie verranno caricate qui -->
    </div>
  </div>

  <!-- Indicatore di caricamento -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Caricamento coreografie...</p>
  </div>


  <script src="mobile-script.js"></script>
</body>
</html>
