<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111">
<title>Test Scroll</title>
<link rel="stylesheet" href="style.css">
<style>
  /* ⭐ BORDO ANIMATO NEON PULSE ⭐ */
  #next-coreo {
    padding: 10px 28px;
    border: 4px solid #ffa200;
    border-radius: 15px;
    animation: neonPulse 2s infinite ease-in-out;
    display: inline-block;
    color: #ffffff;
    text-shadow: 0 0 8px #000;
    background-color: rgba(0,0,0,0.25);
    font-size: 36px;
    white-space: nowrap;
    font-weight: bold;
  }

  @keyframes neonPulse {
    0% { box-shadow: 0 0 8px #ffa200; }
    50% { box-shadow: 0 0 20px #ffcc66; }
    100% { box-shadow: 0 0 8px #ffa200; }
  }

  /* ⭐ FRECCIA LAMPEGGIANTE A SINISTRA ⭐ */
  .arrow-side {
    position: absolute;
    left: -60px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 55px;
    color: #ffa200;
    animation: arrowBlink 1s infinite ease-in-out;
    text-shadow: 0 0 10px #ffae42, 0 0 20px #ffae42;
  }

  @keyframes arrowBlink {
    0% { opacity: 1; transform: translateY(-50%) translateX(0); }
    50% { opacity: 0.2; transform: translateY(-50%) translateX(-8px); }
    100% { opacity: 1; transform: translateY(-50%) translateX(0); }
  }

/* Lampeggio */
  .blink {
    animation: blink 1s step-start infinite;
    color: #ff0000;
    font-weight: bold;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  /* Fade-out graduale */
  .fade-out {
    animation: fadeOut 5s forwards;
  }
  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; color: transparent; }
  }
</style>
</head>
<body>
  <div class="logo-container">
    <img src="MonsterCountryGroup_grey.png" alt="Monster Country Group Logo" class="logo">
  </div>

 <div class="header">
  <table>
    <tr>
      <th colspan="8" style="font-size:24px; text-align:center;">
        DISPLAY COREOGRAFIE RICHIESTE
      </th>
    </tr>

    <tr>
      <th colspan="7" style="text-align:center; font-size:18px; color:#ff7f00;">
        Le righe evidenziate in arancione indicano le coreografie già eseguite
      </th>
      <th style="text-align:right;">
        <button onclick="toggleFullscreen()" aria-label="Attiva o disattiva schermo intero">
          Schermo Intero
        </button>
      </th>
    </tr>

    <tr>
      <th colspan="2" style="text-align:right; font-size:16px;">
        <span id="data-ora"></span>
      </th>

      <th colspan="1" style="text-align:center; font-size:26px;">
        PROSSIMA COREO:
      </th>

      <th colspan="4" style="text-align:center; font-size:44px;">
        <div style="position:relative; display:inline-block; margin-top:20px;">
          <div class="arrow-side">👉</div>
          <span id="next-coreo" aria-live="polite" role="status"></span>
        </div>
      </th>

      <th style="text-align:center;">
        <!-- Nessun contenuto previsto qui -->
      </th>
    </tr>

  </table>
</div>

<!-- TABELLA TITOLI -->
<table class="titoli-tabella">
      <tr>
        <th>🔢 ID</th>
        <th>👢 Coreografia</th>
        <th>🎵 Brano</th>
        <th>✍️ Autore</th>
        <th>💃 Coreografo</th>
      </tr>
    </table>
  </div>

  <div id="scroll-container" class="scroll-container">
    <table id="data-body"></table>
    <!-- Le righe dal CSV verranno inserite qui -->
  </div>

  <div class="controls">
    Velocità: <input type="number" id="speed" value="16" min="1" max="20" aria-label="Velocità dello scorrimento">
    Pausa (sec): <input type="number" id="pause" value="1" min="0" max="20" aria-label="Pausa agli estremi (secondi)">
    <button id="stopScroll" tabindex="0" aria-pressed="false">Ferma Scroll</button>
    <button id="resumeScroll" tabindex="0">Riprendi Scroll</button>
  </div>

  <script>
  document.addEventListener("DOMContentLoaded", () => {
    async function caricaCSV() {
      try {
        const response = await fetch("display.csv");
        const text = await response.text();

        const righe = text.trim().split("\n").slice(3); 
        const tbody = document.getElementById("data-body");
        tbody.innerHTML = "";

        righe.forEach(riga => {
          const celle = riga.split(",").map(c => c.replace(/(^\"|\"$)/g, "").trim());
          if (celle.length < 2) return;

          const tr = document.createElement("tr");
          if (celle[0] === "X") {
            tr.classList.add("orange-row");
          }
          for (let i = 1; i < celle.length; i++) {
            const td = document.createElement("td");
            td.textContent = celle[i];
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error("Errore nel caricamento del CSV:", err);
      }
    }

    // Carico il CSV principale
    caricaCSV();

    // Carico NextCoreo.csv e gestisco lampeggio + fade-out
    async function mostraNextCoreo() {
      try {
        const response = await fetch("NextCoreo.csv");
        const text = await response.text();

        const primaRiga = text.trim().split("\n")[0];
        const valoreB1 = primaRiga.split(",")[1].replace(/(^\"|\"$)/g, "").trim();

        const span = document.getElementById("next-coreo");
        span.textContent = valoreB1;
        span.classList.add("blink");

        // Dopo 2 minuti attivo fade-out
        setTimeout(() => {
          span.classList.remove("blink");
          span.classList.add("fade-out");
        }, 120000);

      } catch (err) {
        console.error("Errore nel caricamento di NextCoreo.csv:", err);
      }
    }

    mostraNextCoreo();
  });

  function toggleFullscreen() {
    const elem = document.documentElement;
    if (!document.fullscreenElement) {
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      }
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      } else if (document.msExitFullscreen) {
        document.msExitFullscreen();
      }
    }
  }
  </script>

  <script src="script.js"></script>
</body>
</html>
