<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <title>Servizio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: rgb(0, 0, 0);
            margin: 0;
            padding: 0;
        }
        /* Stile aggiuntivo per centrare il testo principale */
        .main-content {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
        }
        .service-text {
            font-size: 80px;
            font-weight: bold;
            color: #ffae42;
            text-shadow: 0 0 20px rgba(255, 174, 66, 0.8);
            background: rgba(0,0,0,0);
            padding: 30px 50px;
            border: 4px solid #ffa200;
            border-radius: 20px;
            animation: neonPulse 2s infinite ease-in-out;
            font-family: Arial, sans-serif;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes neonPulse {
            0% { box-shadow: 0 0 8px #ffa200; }
            50% { box-shadow: 0 0 20px #ffcc66; }
            100% { box-shadow: 0 0 8px #ffa200; }
        }
        .logo-container {
        position: relative;   /* Cambiato da fixed */
        top: 10px;
         left: 10px;
         padding: 10px 20px;
         z-index: 2000;     /* Sopra tutto */
        }
        .logo {
         height: 150px;  /* INGIGANTITO */
         filter: drop-shadow(0 0 10px rgba(255,165,0,0.45));
        }
    </style>
</head>
<body>
    
<!-- Logo in alto a sinistra -->
<div class="logo-container">
    <img src="MonsterCountryGroup_black.png" alt="Monster Country Group" class="logo">
</div>

<!-- Contenuto principale centrato -->
    <div class="main-content">
        <div class="service-text" id="service-content">Caricamento...</div>
    </div>

    <script>
        async function caricaServizio() {
            const contentDiv = document.getElementById('service-content');
            
            try {
                // Prova prima servizio.csv (standard) con cache-busting
                const res = await fetch('servizio.csv?t=' + Date.now(), { 
                    cache: 'no-store' 
                });
                
                if (res.ok) {
                    const text = await res.text();
                    const righe = text.trim().split('\n');
                    if (righe.length > 0) {
                        const primaRiga = righe[0];
                        const valore = primaRiga.split(',')[0].trim().replace(/"/g, '');
                        if (valore) {
                            contentDiv.textContent = valore;
                            console.log(" Servizio caricato da servizio.csv: " + valore);
                            return;
                        }
                    }
                }
            } catch (e) {
                console.warn('⚠️  servizio.csv non disponibile:', e);
            }
            
            try {
                // Fallback: prova NextCoreo.csv come nell'index.html con cache-busting
                const res = await fetch('NextCoreo.csv?t=' + Date.now(), { 
                    cache: 'no-store' 
                });
                
                if (!res.ok) {
                    throw new Error("HTTP " + res.status);
                }
                
                const text = await res.text();
                
                // Rimuovi BOM se presente
                const cleanText = text.replace(/^\uFEFF/, "").trim();
                const primaRiga = cleanText.split('\n')[0];
                const valore = primaRiga.split(',')[0].replace(/"/g, '').trim();
                
                if (valore) {
                    contentDiv.textContent = valore;
                    console.log(" Servizio caricato da NextCoreo.csv: " + valore);
                } else {
                    throw new Error("Valore vuoto in NextCoreo.csv");
                }
            } catch (err) {
                console.error('❌ Errore nel caricamento dei dati di servizio:', err);
                contentDiv.textContent = 'ERRORE CARICAMENTO';
                contentDiv.style.color = '#ff0000';
            }
        }

        // Carica al caricamento della pagina
        document.addEventListener('DOMContentLoaded', caricaServizio);
        
        // Ricarica ogni 30 secondi
        setInterval(caricaServizio, 30000);
    </script>
</body>
</html>
