<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>Test Scroll</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Lampeggio */
  .blink {
    animation: blink 1s step-start infinite;
    color: #ff0000;
    font-weight: bold;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  /* Fade-out graduale */
  .fade-out {
    animation: fadeOut 5s forwards;
  }
  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; color: transparent; }
  }
</style>
</head>
<body>
  <div class="logo-container">
    <img src="MonsterCountryGroup_grey.png" alt="Monster Country Group Logo" class="logo">
  </div>

 <div class="header">
  <table>
    <tr>
      <th colspan="8" style="font-size:24px; text-align:center;">
        DISPLAY COREOGRAFIE RICHIESTE
      </th>
    </tr>
    <tr>
      <th colspan="7" style="text-align:center; font-size:18px; color:#ff7f00;">
        Le righe evidenziate in arancione indicano le coreografie già eseguite
      </th>
      <th style="text-align:right;">
        <button onclick="toggleFullscreen()" aria-label="Attiva o disattiva schermo intero">
          Schermo Intero
        </button>
      </th>
    </tr>
    <tr>
      <th colspan="2" style="text-align:right; font-size:16px;">
        <span id="data-ora"></span>
      </th>
      <th colspan="1" style="text-align:center; font-size:26px;">
        PROSSIMA COREO:
      </th>
      <th colspan="4" style="text-align:center; font-size:48px;">
        <span id="next-coreo" aria-live="polite" role="status"></span>
      </th>
      <th style="text-align:center;">
        <!-- Nessun contenuto previsto qui -->
      </th>
    </tr>
  </table>
</div>

<table class="titoli-tabella">
      <tr>
        <th>ID</th>
        <th>Coreografia</th>
        <th>Brano</th>
        <th>Autore</th>
        <th>Coreografo</th>
      </tr>
    </table>
  </div>

  <div id="scroll-container" class="scroll-container">
    <table id="data-body"></table>
    <!-- Le righe dal CSV verranno inserite qui -->
  </div>

  <div class="controls">
    Velocità: <input type="number" id="speed" value="16" min="1" max="20">
    Pausa (sec): <input type="number" id="pause" value="1" min="0" max="20">
    <button id="stopScroll">Ferma Scroll</button>
    <button id="resumeScroll">Riprendi Scroll</button>
  </div>

  <script>
  document.addEventListener("DOMContentLoaded", () => {
    async function caricaCSV() {
      try {
        const response = await fetch("display.csv?t=" + Date.now(), { cache: "no-store" });
        const text = await response.text();

        const righe = text.trim().split("\n").slice(3); 
        const tbody = document.getElementById("data-body");
        tbody.innerHTML = "";

        righe.forEach(riga => {
          const celle = riga.split(",").map(c => c.replace(/(^\"|\"$)/g, "").trim());
          if (celle.length < 2) return;

          const tr = document.createElement("tr");
          if (celle[0] === "X") {
            tr.classList.add("orange-row");
          }
          for (let i = 1; i < celle.length; i++) {
            const td = document.createElement("td");
            td.textContent = celle[i];
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error("Errore nel caricamento del CSV:", err);
      }
    }

    // Carico il CSV principale
    caricaCSV();

    // Carico NextCoreo.csv e gestisco lampeggio + fade-out
    async function mostraNextCoreo() {
      try {
        const response = await fetch("NextCoreo.csv?t=" + Date.now(), { cache: "no-store" });
        const text = await response.text();

        const primaRiga = text.trim().split("\n")[0];
        const valoreB1 = primaRiga.split(",")[1].replace(/(^\"|\"$)/g, "").trim();

        const span = document.getElementById("next-coreo");
        span.textContent = valoreB1;
        span.classList.add("blink");

        // Dopo 2 minuti attivo fade-out
        setTimeout(() => {
          span.classList.remove("blink");
          span.classList.add("fade-out");
        }, 120000);

      } catch (err) {
        console.error("Errore nel caricamento di NextCoreo.csv:", err);
      }
    }

    mostraNextCoreo();
  });

  function toggleFullscreen() {
    const elem = document.documentElement;
    if (!document.fullscreenElement) {
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      }
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      } else if (document.msExitFullscreen) {
        document.msExitFullscreen();
      }
    }
  }
  </script>

  <script src="script.js"></script>
</body>
</html>
