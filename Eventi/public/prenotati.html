<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brani prenotate</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="event-navigation.js"></script>
  <script defer src="inactivity-return.js"></script>
  <script defer src="api-helper.js"></script>
  <script defer src="stati.js"></script>
  <script defer src="render.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => renderLista('prenotati'));
  </script>
</head>
<body>
  <h1>Coreografie prenotate</h1>
  <div class="nav">
    <button class="attention-pulse-button" onclick="goEventiPage('eventi.html')">Torna alla pagina principale</button>
    <button onclick="goEventiPage('spuntati.html')">Eseguite</button>
    <button onclick="goEventiPage('non-spuntati.html')">Non eseguite</button>
    <button onclick="goEventiPage('tutti.html')">Mostra tutte</button>
    <button onclick="goEventiPage('statistiche-dj.html')">Statistiche DJ</button>
    <button onclick="goEventiPage('visualizer.html')">Apri visualizer</button>
  </div>
  <div class="tools-row">
    <input id="search-input" type="text" placeholder="Cerca per titolo, ID o DJ..." />
    <div id="last-update" class="status-note">Ultimo aggiornamento: --</div>
  </div>
  <div id="summary-cards" class="summary-cards"></div>
  <div class="status-note" style="margin-bottom: 12px;">
    Il limite di prenotazione DJ è calcolato solo sulle coreografie attualmente in stato "prenotato"; i brani già eseguiti non vengono conteggiati. Quando esegui o annulli prenotazioni, puoi prenotare nuovamente fino al tuo limite.
  </div>
  <div id="alfabeto-filter" class="alfabeto-filter"></div>
  <hr />
  <div id="lista-render"></div>
</body>
</html>
