<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistiche DJ</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="event-navigation.js"></script>
  <script defer src="inactivity-return.js"></script>
  <script defer src="api-helper.js"></script>
  <script defer src="stati.js"></script>
  <script defer src="search-utils.js"></script>
  <script defer src="statistiche-dj.js"></script>
</head>
<body>
  <h1>Statistiche DJ</h1>
  <div class="nav">
    <button class="attention-pulse-button" onclick="goEventiPage('eventi.html')">Torna alla pagina principale</button>
    <button onclick="goEventiPage('spuntati.html')">Eseguite</button>
    <button onclick="goEventiPage('prenotati.html')">Prenotate</button>
    <button onclick="goEventiPage('tutti.html')">Mostra tutte</button>
    <button onclick="goEventiPage('visualizer.html')">Apri visualizer</button>
  </div>
  <div class="page-note">
    Riepilogo dei brani attualmente marcati come eseguiti, raggruppati per DJ.
  </div>
  <div class="tools-row">
    <div class="search-wrapper">
      <input id="search-input" type="text" placeholder="Cerca per DJ, titolo o ID..." />
      <button id="search-clear-btn" type="button" class="search-clear-btn hidden" aria-label="Pulisci ricerca">×</button>
    </div>
    <div id="last-update" class="status-note">Ultimo aggiornamento: --</div>
  </div>
  <div id="summary-cards" class="summary-cards"></div>
  <hr />
  <div id="dj-stats-list" class="dj-stats-list"></div>
</body>
</html>
