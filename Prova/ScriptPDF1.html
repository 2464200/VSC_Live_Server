<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione PDF - ScriptPDF1</title>
<style>
* { box-sizing: border-box; }
body { font-family: Arial, sans-serif;background: #111; color: #fff; margin: 0; padding: 20px; text-align: center; }
nav { background: #222; padding: 10px; margin-bottom: 30px; border-radius: 5px; }
nav a { color: #ff7f00; margin: 0 15px; text-decoration: none; font-weight: bold; }
nav a:hover { text-decoration: underline; }
.container { max-width: 900px; margin: 0 auto; background: #222; padding: 30px; border-radius: 10px; }
h1 { color: #ff7f00; margin-top: 0; }
.status { background: #333; padding: 12px; margin-bottom: 20px; border-radius: 5px; font-size: 13px; }
.status.loading { color: #ffaa00; }
.status.ready { color: #00ff00; }
.status.error { color: #ff5555; }
.control-group { margin: 30px 0; text-align: left; }
label { color: #ff7f00; font-weight: bold; display: block; margin-bottom: 8px; }
select { background: #333; color: #fff; padding: 10px; border: 1px solid #444; border-radius: 5px; font-size: 14px; width: 100%; margin-bottom: 15px; }
select:focus { outline: none; border-color: #ff7f00; }
.button-group { display: flex; gap: 15px; justify-content: center; margin: 30px 0; flex-wrap: wrap; }
button { background: #ff7f00; color: #000; padding: 12px 30px; border: none; border-radius: 5px; font-weight: bold; font-size: 14px; cursor: pointer; transition: all 0.3s; min-width: 120px; }
button:hover { background: #ffaa33; }
button:active { background: #dd6600; }
.pdf-info { background: #333; padding: 20px; border-radius: 5px; margin: 20px 0; color: #fff; display: none; }
.pdf-info.show { display: block; }
.pdf-name { color: #ff7f00; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
.pdf-counter { color: #aaa; font-size: 12px; }
.message { min-height: 20px; margin: 20px 0; padding: 12px; border-radius: 5px; font-weight: bold; }
.message.error { background: #dc3545; color: #fff; }
.message.success { background: #28a745; color: #fff; }
.message.info { background: #17a2b8; color: #fff; }
</style>
<!-- Config del server API -->
<script src="../api-config.js"></script>
</head>
<body>

<nav>
<a href="/index.html"> Home</a>
<a href="/Prova/Report_black.html"> Report Black</a>
<a href="/Prova/Report_white.html"> Report White</a>
</nav>

<div class="container">
<h1> Gestione PDF - ScriptPDF1</h1>

<div class="status loading" id="status">
<strong> Caricamento...</strong> <span id="status-text">Connessione al server...</span>
</div>

<div class="control-group">
<label for="pdf-select"> Seleziona PDF:</label>
<select id="pdf-select" onchange="onPdfSelected()">
<option value="">-- Caricamento in corso... --</option>
</select>
</div>

<div class="pdf-info" id="pdf-info">
<div class="pdf-name" id="pdf-name"></div>
<div class="pdf-counter" id="pdf-counter"></div>
</div>

<div class="button-group">
<button onclick="previousPdf()" title="PDF precedente"> Precedente</button>
<button onclick="nextPdf()" title="PDF successivo">Successivo </button>
<button onclick="openCurrentPdf()" title="Apri PDF sul monitor secondario"> Apri</button>
<button onclick="closePdfViewer()" title="Chiudi il PDF (o premi ESC sul monitor secondario)"> Chiudi PDF</button>
</div>

<div class="message" id="message"></div>

</div>

<script>
// VARIABILI GLOBALI
let pdfList = [];
let currentIndex = 0;
let serverReady = false;
let serverAutoStarted = false;

/**
 * INIZIALIZZAZIONE - Eseguita al caricamento della pagina
 */
window.addEventListener("beforeunload", async function() {
    // Prima di chiudere la pagina, ferma il server se l'abbiamo avviato noi
    console.log("🔌 Chiusura pagina - Arresto server se auto-avviato...");
    
    if (serverAutoStarted && window.APIConfig.__managerAvailable) {
        try {
            await window.APIConfig.requestStopServer();
            console.log("✅ Server fermato in uscita");
        } catch (e) {
            console.warn("⚠️  Errore nell'arresto del server:", e);
        }
    }
});

document.addEventListener("DOMContentLoaded", async function() {
    console.log("🚀 PageInitialization: DOM caricato");
    console.log("📍 Host: " + window.APIConfig.HOSTNAME);
    console.log("📍 Manager porta: " + window.APIConfig.MANAGER_PORT);
    console.log("📍 PDF Server porte da provare: " + window.APIConfig.PORTS.join(', '));
    
    updateStatus("Inizializzazione...", "loading");
    
    try {
        // Fase 1: Verificare se il Server Manager è disponibile
        console.log("🔍 [1/3] Ricerca Server Manager sulla porta " + window.APIConfig.MANAGER_PORT + "...");
        const managerAvailable = await window.APIConfig.isManagerAvailable();
        
        if (managerAvailable) {
            console.log("✅ Server Manager TROVATO");
            
            // Fase 2a: Se Manager esiste, prova a contattare il PDF Server
            console.log("🔍 [2a/3] Ricerca Server PDF (contatto diretto)...");
            let port = await window.APIConfig.detectAvailablePort();
            
            if (!port) {
                // Fase 2b: Se non trovato direttamente, chiedi al Manager di avviarlo
                console.log("📢 [2b/3] Server PDF non trovato - Richiesta auto-avvio al Manager...");
                updateStatus("Avvio Server PDF...", "loading");
                
                const started = await window.APIConfig.requestStartServer();
                
                if (started) {
                    serverAutoStarted = true;
                    console.log("✅ Richiesta di avvio inviata al Manager");
                    
                    // Attendi che il server si avvi
                    console.log("⏳ Attesa avvio server (3 secondi)...");
                    await new Promise(r => setTimeout(r, 3000));
                    
                    // Riprova la rilevazione della porta
                    port = await window.APIConfig.detectAvailablePort();
                }
            }
            
            // Fase 3: Verifica il risultato
            if (port) {
                console.log(`✅ [3/3] Server PDF disponibile su porta ${port}`);
                serverReady = true;
                updateStatus(`Server pronto (porta ${port})`, "ready");
                loadPdfData();
            } else {
                console.error("❌ [FALLITO] Server PDF non disponibile nemmeno dopo avvio");
                updateStatus("❌ Server PDF non disponibile", "error");
                showMessage("❌ Errore: PDF Server non risponderebbe\n\n💡 Assicurati che Node.js sia installato\n💡 Esegui: node server-manager.js\n💡 In un'altra finestra", "error");
            }
        } else {
            console.warn("⚠️  Server Manager NON trovato - Tentativa connessione diretta...");
            
            // Fallback: Provare connessione diretta al PDF Server senza manager
            console.log("🔍 [2A/3] Ricerca Server PDF (senza Manager)...");
            const port = await window.APIConfig.detectAvailablePort();
            
            if (port) {
                console.log(`✅ [3/3] Server PDF trovato direttamente su porta ${port}`);
                serverReady = true;
                updateStatus(`Server pronto (porta ${port}, senza Manager)`, "ready");
                loadPdfData();
            } else {
                console.error("❌ [FALLITO] Server PDF non trovato - Manager non disponibile");
                updateStatus("❌ Server PDF non raggiungibile", "error");
                showMessage("❌ PDF Server non disponibile\n\n💡 Opzione 1 (CONSIGLIATO):\n   node server-manager.js\n\n💡 Opzione 2 (fallback):\n   node pdf-server.js", "error");
            }
        }
        
        // Monitoraggio attività dell'utente
        document.addEventListener('click', () => window.APIConfig.signalActivity());
        document.addEventListener('keypress', () => window.APIConfig.signalActivity());
        
    } catch (error) {
        console.error("❌ [FATALE] Errore durante inizializzazione:", error);
        updateStatus("Errore durante inizializzazione", "error");
        showMessage(`❌ Errore fatale: ${error.message}`, "error");
    }
});

/**
 * CARICAMENTO DATI PDF LIST
 */
async function loadPdfData() {
    const statusDiv = document.getElementById("status");
    const statusText = document.getElementById("status-text");
    
    try {
        console.log("📚 Caricamento lista PDF...");
        statusText.textContent = "Caricamento lista PDF...";
        
        // Usa il nuovo sistema di fetch con retry automatico
        const response = await window.APIConfig.fetchAPI(`/api/pdf-list?t=${Date.now()}`);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        const text = await response.text();
        if (!text) throw new Error("Risposta vuota dal server");
        
        const data = JSON.parse(text);
        
        if (!data.success || !Array.isArray(data.files)) {
            throw new Error(data.error || "Dati invalidi dalla API");
        }
        
        pdfList = data.files;
        console.log(`✅ ${pdfList.length} PDF caricati`);
        
        if (pdfList.length === 0) {
            updateStatus("Nessun PDF trovato in C:\\SCRIPT_PDF", "error");
            showMessage("📁 La cartella C:\\SCRIPT_PDF è vuota", "error");
            return;
        }
        
        // Popola UI
        populateSelect();
        updateDisplay();
        updateStatus(`Pronto - ${pdfList.length} PDF disponibili`, "ready");
        
    } catch (error) {
        const msg = error.message || "Errore sconosciuto";
        console.error("❌ Errore caricamento:", msg);
        
        updateStatus(`Errore: ${msg}`, "error");
        showMessage(`❌ ${msg}\n\n💡 Se il server non è avviato, esegui:\nnode server-manager.js`, "error");
    }
}

/**
 * AGGIORNA STATO UI
 */
function updateStatus(text, type) {
    const status = document.getElementById("status");
    const statusText = document.getElementById("status-text");
    if (status && statusText) {
        status.className = `status ${type}`;
        statusText.textContent = text;
    }
}

/**
 * POPOLA SELECT CON LISTA PDF
 */
function populateSelect() {
    const select = document.getElementById("pdf-select");
    if (!select) return;
    
    select.innerHTML = "";
    pdfList.forEach((pdf, idx) => {
        const opt = document.createElement("option");
        opt.value = idx;
        opt.textContent = `${idx + 1}. ${pdf.name || "PDF senza nome"}`;
        select.appendChild(opt);
    });
    
    if (pdfList.length > 0) select.value = 0;
}

/**
 * AGGIORNA DISPLAY PDF CORRENTE
 */
function updateDisplay() {
    const info = document.getElementById("pdf-info");
    
    if (!pdfList.length || currentIndex < 0 || currentIndex >= pdfList.length) {
        if (info) info.classList.remove("show");
        return;
    }
    
    const pdf = pdfList[currentIndex];
    const nameEl = document.getElementById("pdf-name");
    const counterEl = document.getElementById("pdf-counter");
    const select = document.getElementById("pdf-select");
    
    if (nameEl) nameEl.textContent = pdf.name || "PDF senza nome";
    if (counterEl) counterEl.textContent = `${currentIndex + 1} di ${pdfList.length}`;
    if (info) info.classList.add("show");
    if (select) select.value = currentIndex;
}

/**
 * NAVIGAZIONE - PDF PRECEDENTE
 */
function previousPdf() {
    if (pdfList.length < 2) return;
    currentIndex = (currentIndex - 1 + pdfList.length) % pdfList.length;
    updateDisplay();
}

/**
 * NAVIGAZIONE - PDF SUCCESSIVO
 */
function nextPdf() {
    if (pdfList.length < 2) return;
    currentIndex = (currentIndex + 1) % pdfList.length;
    updateDisplay();
}

/**
 * CAMBIO SELEZIONE DA SELECT
 */
function onPdfSelected() {
    const select = document.getElementById("pdf-select");
    if (select) currentIndex = parseInt(select.value) || 0;
    updateDisplay();
}

/**
 * APERTURA PDF IN CHROME
 */
async function openCurrentPdf() {
    if (!serverReady) {
        showMessage("⚠️ Server non disponibile", "error");
        return;
    }
    
    if (!pdfList.length || currentIndex < 0 || currentIndex >= pdfList.length) {
        showMessage("❌ PDF non disponibile", "error");
        return;
    }
    
    const pdf = pdfList[currentIndex];
    if (!pdf || !pdf.path || !pdf.name) {
        showMessage("❌ PDF corrotto o invalido", "error");
        return;
    }
    
    try {
        console.log(`📖 Apertura PDF: ${pdf.name}`);
        updateStatus(`Apertura ${pdf.name}...`, "loading");
        
        const response = await window.APIConfig.fetchAPI('/api/open-pdf', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                filePath: pdf.path, 
                fileName: pdf.name 
            })
        });
        
        const text = await response.text();
        const data = text ? JSON.parse(text) : {};
        
        if (data.success) {
            console.log(`✅ PDF aperto: ${pdf.name}`);
            showMessage(`✅ ${pdf.name}`, "success");
            updateStatus(`Aperto: ${pdf.name}`, "ready");
        } else {
            throw new Error(data.error || "Errore sconosciuto");
        }
    } catch (error) {
        const msg = error.message || "Errore apertura PDF";
        console.error("❌ Errore:", msg);
        
        updateStatus(`Errore: ${msg}`, "error");
        showMessage(`❌ ${msg}`, "error");
    }
}

/**
 * CHIUSURA PDF E CHROME
 */
async function closePdfViewer() {
    console.log("🛑 Chiusura PDF viewer...");
    
    try {
        if (!serverReady) {
            console.warn("Server non disponibile, skip chiusura remota");
        } else {
            await window.APIConfig.fetchAPI('/api/close-chrome', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
        }
    } catch (error) {
        console.warn("⚠️ Errore chiusura remota:", error.message);
    }
    
    showMessage("Chiusura in corso...", "info");
    setTimeout(() => window.close(), 1000);
}

/**
 * MOSTRA MESSAGGIO TEMPORANEO
 */
function showMessage(text, type) {
    const msg = document.getElementById("message");
    if (!msg) return;
    
    msg.className = `message ${type}`;
    msg.textContent = text;
    
    if (type === "success" || type === "error") {
        setTimeout(() => {
            msg.textContent = "";
            msg.className = "message";
        }, 5000);
    }
}

// LOG INIZIALE
console.log("📍 ScriptPDF1 - Gestione automatica server");
console.log("   💡 Il server PDF si avvia/spegne AUTOMATICAMENTE");
console.log("   💡 Assicurati che server-manager.js sia avviato: node server-manager.js");

</script>

</body>
</html>
