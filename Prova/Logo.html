<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextCoreo</title>
    <style>
        /* 📍 MENU DI NAVIGAZIONE */
        nav { background: #222; padding: 10px; margin-bottom: 15px; border-radius: 5px; }
        nav a { color: #ff7f00; margin: 0 12px; text-decoration: none; font-weight: bold; font-size: 13px; }
        nav a:hover { text-decoration: underline; }
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #111;
            color: white;
            text-align: center;
        }
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 60px;
            padding: 30px;
            border: 4px solid #ffa200;
            border-radius: 20px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            animation: neonPulse 2s infinite ease-in-out;
            background-color: rgba(0, 0, 0, 0.3);
        }
        .logo-image {
            height: 500px;
            filter: drop-shadow(0 0 10px rgba(255, 165, 0, 0.6));
        }
        @keyframes neonPulse {
            0% { box-shadow: 0 0 8px #ffa200; }
            50% { box-shadow: 0 0 25px #ffcc66; }
            100% { box-shadow: 0 0 8px #ffa200; }
        }
    </style>
</head>
<body>
    <div id="global-nav-container"></div>
<script src="/nav.js"></script>

    <h1 style="font-size:40px;">Monster Country Group</h1>
    <p style="font-size:12px;">naviga tra le pagine usando il menu sopra.</p>

    <div class="logo-container">
        <img src="MonsterCountryGroup_grey.png" alt="Monster Country Group" class="logo-image">
    </div>

</body>
</html>
