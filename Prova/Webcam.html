
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>WEBCAM</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
    }
    nav {
        background: #222;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 5px;
    }
    nav a {
        color: #ff7f00;
        margin: 0 12px;

    nav a:hover {
        text-decoration: underline;
    }
    h1 {
        margin-top: 20px;
        color: #333;
    }
    video {
        margin-top: 20px;
        width: 80%;
        max-width: 800px;
        border: 3px solid #333;
        border-radius: 10px;
        background: #000;

</style>

<body>
<div id="global-nav-container"></div>
<script src="/nav.js"></script>
<h1>Streaming Webcam via VLC</h1>
<video id="webcam" autoplay controls></video>

<script>
    // Imposta la sorgente del video allo stream VLC
    document.getElementById('webcam').src = 'http://localhost:8080';
</script>
</body>
</html>
