<!DOCTYPE html>
<html lang='it'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Report Statistico</title>
<script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
<style>
body{font-family:Arial;text-align:center;background:#111;color:#fff;margin:0}
nav{background:#222;padding:10px;margin-bottom:15px;border-radius:5px}
nav a{color:#ff7f00;margin:0 12px;text-decoration:none;font-weight:bold;font-size:13px}
nav a:hover{text-decoration:underline}
.container{max-width:1000px;margin:auto}
table{border-collapse:collapse;margin:20px auto;width:100%;background:#222;color:#fff}
th,td{border:1px solid #444;padding:8px}
th{background:#222;color:#ff7f00;font-weight:bold}
td{color:#fff}
h1,h2{color:#ff7f00}
p{color:#fff}
strong{color:#ff7f00}
.charts-row{display:flex;gap:20px;align-items:center;margin:20px auto}
.chart-pie{width:260px;height:260px;background:#222;padding:10px;border-radius:10px}
.chart-bar{flex:1;height:280px;background:#222;padding:15px;border-radius:10px}
</style>
</head><body>
<div id="global-nav-container"></div>
<script src="/nav.js"></script>
<div class='container'>
<h1>Coreografie - Report Statistico</h1>
<p>Eseguite in totale: <strong>0 </strong>
<p>Richieste con QR: <strong>4</strong> di cui non eseguite: <strong>0</strong></p>
<p>Coreografia piu' richiesta: <strong>COME TO DANCE</strong> (1 volte)</p>
<h2>Top 4 Coreografie</h2>
<table>
<tr><th>#</th><th>Coreografia</th><th>Richieste</th></tr>
<tr><td>1</td><td>COME TO DANCE</td><td>1</td></tr>
<tr><td>2</td><td>NOTHING LIKE THIS</td><td>1</td></tr>
<tr><td>3</td><td>LARGER THAN LIFE</td><td>1</td></tr>
<tr><td>4</td><td>DOODLES</td><td>1</td></tr>
</table>
<div class='charts-row'>
<div class='chart-pie'><canvas id='pie'></canvas></div>
<div class='chart-bar'><canvas id='bar'></canvas></div>
</div>
<script>
new Chart(document.getElementById('pie').getContext('2d'),{type:'pie',data:{labels:['Eseguite','Non eseguite'],datasets:[{data:[4,0],backgroundColor:['#28A745','#DC3545']}]},options:{responsive:true,maintainAspectRatio:false}});
new Chart(document.getElementById('bar').getContext('2d'),{type:'bar',data:{labels:[
'COME TO DANCE',
'NOTHING LIKE THIS',
'LARGER THAN LIFE',
'DOODLES'
],datasets:[{data:[
1,
1,
1,
1
],backgroundColor:'#ff7f00'}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,ticks:{color:'#fff'},grid:{color:'#444'}},x:{ticks:{color:'#fff'},grid:{color:'#444'}}}}});
</script>
</div></body></html>
