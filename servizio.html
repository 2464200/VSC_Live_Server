<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <title>Servizio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 📍 MENU DI NAVIGAZIONE */
        nav { background: #222; padding: 10px; margin-bottom: 15px; border-radius: 5px; position: fixed; top: 0; left: 0; right: 0; z-index: 3000; }
        nav a { color: #ff7f00; margin: 0 12px; text-decoration: none; font-weight: bold; font-size: 13px; }
        nav a:hover { text-decoration: underline; }
        body {
            background: rgb(0, 0, 0);
            margin: 0;
            padding: 0;
        }
        /* Stile aggiuntivo per centrare il testo principale */
        .main-content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
        }
        .service-text {
            font-size: 80px;
            font-weight: bold;
            color: #ffae42;
            text-shadow: 0 0 20px rgba(255, 174, 66, 0.8);
            background: rgba(0,0,0,0);
            padding: 30px 50px;
            border: 4px solid #ffa200;
            border-radius: 20px;
            animation: neonPulse 2s infinite ease-in-out;
            font-family: Arial, sans-serif;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes neonPulse {
            0% { box-shadow: 0 0 8px #ffa200; }
            50% { box-shadow: 0 0 20px #ffcc66; }
            100% { box-shadow: 0 0 8px #ffa200; }
        }
        .logo-container {
        position: fixed;   /* Fisso in alto a sinistra */
        top: 45px;
         left: 10px;
         padding: 10px 20px;
         z-index: 2000;     /* Sopra tutto */
        }
        .logo {
         height: 150px;  /* INGIGANTITO */
         filter: drop-shadow(0 0 10px rgba(255,165,0,0.45));
        }
    </style>
</head>
<body>
<div id="global-nav-container"></div>
<script src="/nav.js"></script>
    
<!-- Logo in alto a sinistra -->
<div class="logo-container">
    <img src="MonsterCountryGroup_black.png" alt="Monster Country Group" class="logo">
</div>

<!-- Contenuto principale centrato -->
    <div class="main-content">
        <div class="service-text" id="service-content">Caricamento...</div>
    </div>

    <script>
        function normalizeValue(raw) {
            if (!raw) return '';
            const cleaned = raw.trim().replace(/"/g, '');
            if (!cleaned) return '';
            return cleaned;
        }

        async function readServiceFile(filename) {
            const response = await fetch(`${filename}?t=${Date.now()}`, { cache: 'no-store' });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status} ${response.statusText}`);
            }

            const text = await response.text();
            const line = text.replace(/^\uFEFF/, '').trim().split('\n')[0] || '';
            if (!line) {
                throw new Error(`File ${filename} vuoto o primo record vuoto`);
            }

            const cols = line.split(',').map(c => c.trim());
            if (cols.length >= 2 && cols[0].toUpperCase() === 'X') {
                return normalizeValue(cols[1]);
            }

            return normalizeValue(cols[0]);
        }

        async function caricaServizio() {
            const contentDiv = document.getElementById('service-content');
            contentDiv.textContent = 'Caricamento...';
            contentDiv.style.color = '';

            try {
                const value = await readServiceFile('servizio.csv');
                contentDiv.textContent = value;
                console.log(`Servizio caricato da servizio.csv: ${value}`);
                return;
            } catch (e) {
                console.warn('servizio.csv non disponibile o invalido:', e);
            }

            try {
                const value = await readServiceFile('NextCoreo.csv');
                contentDiv.textContent = value;
                console.log(`Servizio caricato da NextCoreo.csv: ${value}`);
                return;
            } catch (e) {
                console.error('Errore nel caricamento di NextCoreo.csv:', e);
                contentDiv.textContent = 'ERRORE CARICAMENTO';
                contentDiv.style.color = '#ff0000';
            }
        }

        document.addEventListener('DOMContentLoaded', caricaServizio);
        setInterval(caricaServizio, 30000);
    </script>
</body>
</html>
